<!DOCTYPE html>

  <!-- style sheets -->
  <link href="../resources/css/token/krds_tokens.css" rel="stylesheet">
  <link href="../resources/css/common/common.css" rel="stylesheet">
  <link href="../resources/css/component/component.css" rel="stylesheet">
  <link href="../resources/css/custom.css" rel="stylesheet">

</head>

<body>
  <div>
    <!-- header -->

    <div class="container">
      <div class="inner">
        <!-- breadcrumb -->
        <nav class="krds-breadcrumb-wrap" aria-label="현재 경로" id="breadcrumb">
          <ol class="breadcrumb">
            <li class="home"><a href="#" class="txt">홈</a></li>
            <li><a href="#" class="txt">분석 모델</a></li>
            <li><a href="#" class="txt">건설업 등록기준 미달업체</a></li>
            <li><a href="#" class="txt on">가중치 변경</a></li>

        <!-- breadcrumb -->

        <!-- 페이지 타이틀 영역 -->
        <div class="page-title-wrap">
          <h1 class="h-tit">가중치 변경</h1>
          <div class="btn-wrap">
            <button type="button" class="krds-btn medium text">
              <i class="svg-icon ico-information"></i>
              이용가이드
            </button>
          </div>
        </div>
        <!-- //페이지 타이틀 영역 -->

        <div class="contents">

                </thead>
                <tbody>
                  <tr>
                    <td class="border-right">
                      <span class="add-head">No</span><span class="tds">2</span>
                    </td>
                    <td>
                      <span class="add-head">종류</span><span class="tds">종합건설</span>
                    </td>
                    <td>

                    </td>
                    <td>
                      <span class="add-head">등록자</span><span class="tds">star@gg.go.kr</span>
                    </td>
                    <td>
                      <span class="add-head">등록일자</span><span class="tds">2025.05.07</span>
                    </td>
                    <td>

                  <tr>

                    </td>
                    <td>
                      <span class="add-head">종류</span><span class="tds">전문건설</span>
                    </td>
                    <td>
                      <span class="add-head">기준연월</span><span class="tds">2025.04</span>
                    </td>
                    <td>
                      <span class="add-head">등록자</span><span class="tds">star@gg.go.kr</span>
                    </td>
                    <td>
                      <span class="add-head">등록일자</span><span class="tds">2025.05.07</span>
                    </td>
                    <td>
                      <span class="add-head">최근 수정일자</span><span class="tds"></span>
                    </td>
                  </tr>

            <div class="pagination-wrap">
              <div class="krds-pagination">
                <a class="page-navi prev" href="#">이전</a>
                <div class="page-links">
                  <a class="page-link" href="#">1</a>
                  <a class="page-link" href="#">2</a>
                  <a class="page-link" href="#">3</a>

                <a class="page-navi next" href="#">다음</a>
              </div>

              <div class="page-jump-area">
                <input type="number" min="1" max="99" class="krds-input small text-center" />
                <p>/ <span>99</span></p>
                <button type="button" class="krds-btn secondary small">이동</button>
              </div>
              <!-- //직접 이동 -->
            </div>
            <!-- //pagination -->

            <!-- 페이지 버튼 영역 -->
            <div class="page-btn-wrap both m-column justify-end">
              <div class="btn-wrap">

  </div>

  <!-- js -->
  <script src="../resources/js/component/ui-script.js"></script>
  <script src="../resources/js/component/common.js"></script>
